<script>
firebase.initializeApp({apiKey:"AIzaSyBYe4JG5fHfKYsB7ROmI7sn_D4NRHPfXeA",authDomain:"vetreparto-f38fd.firebaseapp.com",databaseURL:"https://vetreparto-f38fd-default-rtdb.firebaseio.com",projectId:"vetreparto-f38fd",storageBucket:"vetreparto-f38fd.firebasestorage.app",messagingSenderId:"350164561706",appId:"1:350164561706:web:e05f2823ba6cd5a039b853"});
var db=firebase.database();
var CHOFER_ID=new URLSearchParams(window.location.search).get('chofer')||'angel';
db.ref('.info/connected').on('value',function(s){
  var ok=s.val();
  var dot=document.getElementById('sync-dot');
  var lbl=document.getElementById('sync-label');
  if(dot)dot.style.background=ok?'#4ade80':'#f87171';
  if(lbl)lbl.textContent=ok?'En linea':'Sin conexion';
});
function guardarEnFirebase(){
  var hoy=new Date();
  var fecha=hoy.getFullYear()+'-'+(hoy.getMonth()+1).toString().padStart(2,'0')+'-'+hoy.getDate().toString().padStart(2,'0');
  db.ref('rutas/'+CHOFER_ID+'/'+fecha).set({
    choferNombre:document.getElementById('chofer-nombre').value||CHOFER_ID,
    paradas:par||[],
    ultimaActualizacion:Date.now(),
    km:document.getElementById('sv-d').textContent,
    tiempo:document.getElementById('sv-t').textContent
  }).catch(function(e){console.error('FB error:',e);});
}
</script>

<body>
<div id="app">
  <div class="topbar">
    <span style="font-size:16px">&#128062;</span>
    <h1>VetReparto</h1>
    <div id="sync-dot" style="width:8px;height:8px;border-radius:50%;background:#f87171;flex-shrink:0;transition:background 0.5s"></div>
    <span id="sync-label" style="font-size:10px;opacity:0.8">Conectando...</span>
    <span style="background:rgba(255,255,255,0.2);padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;margin-left:4px"><span id="total-c">...</span> clientes</span>
  </div>
  <div class="body">
    <div class="panel" id="panel">
      <div class="ptabs">
        <button class="tab active" id="tab-buscar" onclick="switchTab('buscar')">Buscar</button>
        <button class="tab" id="tab-ruta" onclick="switchTab('ruta')">Ruta (<span id="rc">0</span>)</button>
        <button class="tab" id="tab-resumen" onclick="switchTab('resumen');actualizarResumen()">Resumen</button>
      </div>
      <div class="tc active" id="content-buscar">
        <div class="sbox"><input type="text" id="si" placeholder="Nombre o ID SAP..." oninput="buscar(this.value)" autocomplete="off"></div>
        <div class="sres" id="sr"><div style="padding:14px;text-align:center;color:#7a7870;font-size:13px">Escribe para buscar entre <span id="total-c">...</span> clientes</div></div>
      </div>
      <div class="tc" id="content-ruta">
        <div class="chofer-box"><input type="text" id="chofer-nombre" placeholder="Nombre del repartidor..." oninput="guardarEnFirebase()"></div>
        <div class="ph"><span style="font-size:13px;font-weight:700">Paradas del dia</span><span class="pcnt" id="pc">0</span></div>
        <div class="plist" id="pl"><div class="empty"><div style="font-size:28px;opacity:0.4">&#128205;</div><div>Sin paradas</div><div style="font-size:11px">Agrega desde Buscar</div></div></div>
        <div class="pfooter">
          <div class="rsum" id="rs" style="display:none">
            <div class="rstat"><div class="rsval" id="sv-p">0</div><div class="rslbl">Paradas</div></div>
            <div class="rstat"><div class="rsval" id="sv-d">-</div><div class="rslbl">Km</div></div>
            <div class="rstat"><div class="rsval" id="sv-t">-</div><div class="rslbl">Tiempo</div></div>
          </div>
          <button class="cbtn" id="cb" onclick="calcular()" disabled>Calcular ruta optima</button>
          <div class="row2">
            <button class="clrbtn" onclick="limpiar()">Limpiar</button>
            <button class="clrbtn wa" onclick="switchTab('resumen');actualizarResumen()">WhatsApp</button>
          </div>
        </div>
      </div>
      <div class="tc" id="content-resumen">
        <div class="res-btns">
          <button class="dl-btn wa" onclick="compartirWhatsApp()">Compartir WhatsApp</button>
          <button class="dl-btn csv" onclick="descargarResumen()">Descargar CSV</button>
        </div>
        <div class="resumen-body" id="resumen-body"><div style="padding:16px;text-align:center;color:#7a7870;font-size:13px">Agrega paradas para ver el resumen</div></div>
      </div>
    </div>
    <div class="mapwrap">
      <div id="map"></div>
      <div class="loader" id="ld"><div class="spin"></div>Calculando...</div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<button class="map-toggle" id="map-toggle-btn" onclick="toggleMap()">Ver mapa</button>
<script>
var C=[];

db.ref('clientes').once('value').then(function(snap){
  var data=snap.val();
  if(data){
    C=Object.values(data);
    C.sort(function(a,b){return a.nombre.localeCompare(b.nombre);});
    var el=document.getElementById('total-c');
    if(el)el.textContent=C.length;
    document.getElementById('sr').innerHTML='<div style="padding:14px;text-align:center;color:#7a7870;font-size:13px">Escribe para buscar entre '+C.length+' clientes</div>';
    if(map)dibujar();
  }
}).catch(function(e){console.error('Error cargando clientes:',e);});

db.ref('clientes').on('value',function(snap){
  var data=snap.val();
  if(data){
    C=Object.values(data);
    C.sort(function(a,b){return a.nombre.localeCompare(b.nombre);});
    var el=document.getElementById('total-c');
    if(el)el.textContent=C.length;
    if(map&&!rutaActiva)dibujar();
  }
});

var ALMACEN={lat:25.681553680100162,lng:-100.32371502760287};
var map,iw,dr,bm=[],rm=[],par=[],rutaActiva=false;

window.addEventListener('load',function(){
  var hoy=new Date();
  var fechaHoy=hoy.getFullYear()+'-'+(hoy.getMonth()+1).toString().padStart(2,'0')+'-'+hoy.getDate().toString().padStart(2,'0');
  db.ref('rutas/'+CHOFER_ID+'/'+fechaHoy).once('value').then(function(s){
    var d=s.val();
    if(d&&d.paradas&&d.paradas.length>0&&par.length===0){
      par=d.paradas;
      var cn=document.getElementById('chofer-nombre');
      if(d.choferNombre&&cn)cn.value=d.choferNombre;
      ui();
      toast('Ruta restaurada: '+d.paradas.length+' paradas');
    }
  }).catch(function(e){console.log('No saved route:',e);});
});

function initMap(){
  map=new google.maps.Map(document.getElementById('map'),{center:{lat:25.6866,lng:-100.3161},zoom:11,mapTypeControl:false,streetViewControl:false,styles:[{featureType:'poi',elementType:'labels',stylers:[{visibility:'off'}]}]});
  iw=new google.maps.InfoWindow();
  dr=new google.maps.DirectionsRenderer({suppressMarkers:true,polylineOptions:{strokeColor:'#1a6b4a',strokeWeight:5,strokeOpacity:0.8}});
  dr.setMap(map);
  new google.maps.Marker({position:ALMACEN,map:map,title:'Almacen',icon:{path:google.maps.SymbolPath.CIRCLE,scale:10,fillColor:'#1a6b4a',fillOpacity:1,strokeColor:'#fff',strokeWeight:2.5},zIndex:2000});
  dibujar();
}
function enR(id){return par.some(function(p){return p.id===id;})}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function dibujar(){
  if(!map)return;
  bm.forEach(function(m){m.setMap(null);}); bm=[];
  C.forEach(function(c){
    if(enR(c.id))return;
    var m=new google.maps.Marker({position:{lat:c.lat,lng:c.lng},map:map,title:c.nombre,icon:{path:google.maps.SymbolPath.CIRCLE,scale:6,fillColor:'#1a6b4a',fillOpacity:0.7,strokeColor:'#fff',strokeWeight:1.5},zIndex:1});
    (function(cl){m.addListener('click',function(){
      iw.setContent('<div style="font-family:Arial;padding:4px;min-width:150px"><div style="font-size:13px;font-weight:700;margin-bottom:4px">'+esc(cl.nombre)+'</div><div style="font-size:11px;color:#777;margin-bottom:8px">'+cl.id+'</div><button id="iwb" style="width:100%;padding:7px;background:#1a6b4a;color:#fff;border:none;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;">+ Agregar</button></div>');
      iw.open(map,m);
      setTimeout(function(){var b=document.getElementById('iwb');if(b&&!enR(cl.id))b.onclick=function(){agregar(cl);iw.close();};},80);
    });})(c);
    bm.push(m);
  });
}
function buscar(v){
  var box=document.getElementById('sr');
  if(!v||v.length<2){box.innerHTML='<div style="padding:14px;text-align:center;color:#7a7870;font-size:13px">Escribe para buscar</div>';return;}
  var q=v.toLowerCase(),r=C.filter(function(c){return c.nombre.toLowerCase().indexOf(q)>=0||c.id.toLowerCase().indexOf(q)>=0||c.dir.toLowerCase().indexOf(q)>=0;}).slice(0,40);
  if(!r.length){box.innerHTML='<div style="padding:14px;text-align:center;color:#7a7870;font-size:13px">Sin resultados</div>';return;}
  var h='';
  r.forEach(function(c){var ya=enR(c.id);h+='<div class="si"><div class="sich">'+esc(c.nombre.charAt(0))+'</div><div style="flex:1;min-width:0"><div class="snm">'+esc(c.nombre)+'</div><div class="sid2">'+c.id+'</div></div><button class="abtn'+(ya?' added':'')+'" data-id="'+c.id+'">'+(ya?'En ruta':'+ Agregar')+'</button></div>';});
  box.innerHTML=h;
  box.querySelectorAll('.abtn:not(.added)').forEach(function(b){b.addEventListener('click',function(e){e.stopPropagation();var c=C.find(function(x){return x.id===b.dataset.id;});if(c)agregar(c);});});
}
function agregar(c){
  if(!c||enR(c.id)){toast('Ya esta en la ruta');return;}
  par.push({id:c.id,nombre:c.nombre,dir:c.dir,lat:c.lat,lng:c.lng,factura:'',pedido:'',entregado:false,horaEntrega:null,kmDesde:null,minDesde:null,origenDesde:null});
  ui();if(map)map.panTo({lat:c.lat,lng:c.lng});
  toast('+ '+c.nombre);guardarEnFirebase();
  var inp=document.getElementById('si');if(inp.value.length>=2)buscar(inp.value);
}
function quitar(id){par=par.filter(function(p){return p.id!==id;});ui();clearRuta();guardarEnFirebase();}
function setField(id,field,val){var p=par.find(function(x){return x.id===id;});if(p){p[field]=val;guardarEnFirebase();}}
function marcarEntregado(id){
  var p=par.find(function(x){return x.id===id;});if(!p||p.entregado)return;
  p.entregado=true;var now=new Date();
  p.horaEntrega=now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0');
  ui();if(rutaActiva)pines();actualizarResumen();guardarEnFirebase();
  toast('Entregado a las '+p.horaEntrega);
}
function ui(){
  var n=par.length;
  document.getElementById('rc').textContent=n;document.getElementById('pc').textContent=n;
  document.getElementById('sv-p').textContent=n;document.getElementById('cb').disabled=n<2;
  var pl=document.getElementById('pl');
  if(!n){pl.innerHTML='<div class="empty"><div style="font-size:28px;opacity:0.4">&#128205;</div><div>Sin paradas</div><div style="font-size:11px">Agrega desde Buscar</div></div>';document.getElementById('rs').style.display='none';return;}
  var h='';
  par.forEach(function(p,i){
    h+='<div class="pitem"><div class="pitem-top"><div class="pnum'+(p.entregado?' done':'')+'">'+( p.entregado?'&#10003;':(i+1))+'</div><div class="pnm">'+esc(p.nombre)+'</div>';
    if(!p.entregado)h+='<button class="rbtn" data-id="'+p.id+'">&#x2715;</button>';
    h+='</div><div class="pfields"><div class="pfield"><label>No. Pedido</label><input type="text" placeholder="ej:75069" value="'+esc(p.pedido)+'" data-id="'+p.id+'" data-field="pedido" class="pfin'+(p.pedido?' filled':'')+'"></div>';
    h+='<div class="pfield"><label>No. Factura</label><input type="text" placeholder="ej:GI1520" value="'+esc(p.factura)+'" data-id="'+p.id+'" data-field="factura" class="pfin'+(p.factura?' filled':'')+'"></div></div>';
    h+='<div class="entrega-row">';
    if(p.entregado){h+='<button class="ebtn done">&#10003; Entregado</button><span class="hora-entrega">'+p.horaEntrega+'</span>';}
    else{h+='<button class="ebtn pending" data-id="'+p.id+'">Marcar entregado</button>';}
    h+='</div></div>';
  });
  pl.innerHTML=h;
  pl.querySelectorAll('.rbtn').forEach(function(b){b.addEventListener('click',function(){quitar(b.dataset.id);});});
  pl.querySelectorAll('.pfin').forEach(function(inp){inp.addEventListener('input',function(){setField(inp.dataset.id,inp.dataset.field,inp.value);inp.classList.toggle('filled',inp.value.length>0);actualizarResumen();});});
  pl.querySelectorAll('.ebtn.pending').forEach(function(b){b.addEventListener('click',function(){marcarEntregado(b.dataset.id);});});
  document.getElementById('rs').style.display='grid';
  if(!rutaActiva)dibujar();actualizarResumen();
}
function actualizarResumen(){
  var body=document.getElementById('resumen-body');
  if(!par.length){body.innerHTML='<div style="padding:16px;text-align:center;color:#7a7870;font-size:13px">Sin paradas</div>';return;}
  var ent=par.filter(function(p){return p.entregado;}).length;
  var chofer=document.getElementById('chofer-nombre').value||'Repartidor';
  var hoy=new Date(),fecha=hoy.getDate()+'/'+(hoy.getMonth()+1)+'/'+hoy.getFullYear();
  var h='<div class="res-header"><div class="res-title">'+esc(chofer)+'</div><div class="res-sub">'+fecha+'</div></div>';
  h+='<div class="res-stats"><div class="res-stat"><div class="res-stat-val">'+par.length+'</div><div class="res-stat-lbl">Paradas</div></div><div class="res-stat"><div class="res-stat-val" style="color:#1a6b4a">'+ent+'</div><div class="res-stat-lbl">Entregados</div></div><div class="res-stat"><div class="res-stat-val" style="color:#e65100">'+(par.length-ent)+'</div><div class="res-stat-lbl">Pendientes</div></div></div>';
  par.forEach(function(p,i){
    h+='<div class="res-item"><div class="res-item-top"><div class="res-num'+(p.entregado?' done':'')+'">'+( p.entregado?'&#10003;':(i+1))+'</div><div class="res-nombre">'+esc(p.nombre)+'</div>'+(p.entregado?'<span class="res-tag tag-ok">OK</span>':'<span class="res-tag tag-pend">Pendiente</span>')+'</div>';
    h+='<div class="res-fields"><span class="rfl">Pedido:</span><span class="rfv">'+(p.pedido||'-')+'</span><span class="rfl">Factura:</span><span class="rfv">'+(p.factura||'-')+'</span><span class="rfl">Hora:</span><span class="rfv">'+(p.horaEntrega||'-')+'</span>';
    if(p.kmDesde)h+='<span class="rfl">Desde:</span><span class="rfv">'+esc(p.origenDesde)+'</span><span class="rfl">Dist:</span><span class="rfv">'+p.kmDesde+' / '+p.minDesde+'</span>';
    h+='</div></div>';
  });
  body.innerHTML=h;
}
function calcular(){
  if(par.length<2||!map)return;
  document.getElementById('ld').style.display='flex';document.getElementById('cb').disabled=true;clearRmk();
  var ds=new google.maps.DirectionsService();
  var req={
    origin:{lat:ALMACEN.lat,lng:ALMACEN.lng},
    destination:{lat:ALMACEN.lat,lng:ALMACEN.lng},
    waypoints:par.map(function(p){return{location:{lat:p.lat,lng:p.lng},stopover:true};}),
    travelMode:google.maps.TravelMode.DRIVING,
    optimizeWaypoints:true
  };
  ds.route(req,function(res,st){
    if(st==='OK'){procesarRuta(res);}
    else{req.optimizeWaypoints=false;ds.route(req,function(r2,s2){document.getElementById('ld').style.display='none';document.getElementById('cb').disabled=false;if(s2==='OK')procesarRuta(r2);else toast('Error ruta: '+s2);});}
  });
}
function procesarRuta(res){
  document.getElementById('ld').style.display='none';document.getElementById('cb').disabled=false;
  dr.setDirections(res);
  var ord=res.routes[0].waypoint_order,all=par.slice(0),ro=[];
  ord.forEach(function(i){ro.push(all[i]);});
  par=ro;
  var td=0,tt=0;
  res.routes[0].legs.forEach(function(leg,i){
    td+=leg.distance.value;
    tt+=(leg.duration_in_traffic||leg.duration).value;
    if(i<par.length){
      par[i].kmDesde=leg.distance.text;
      par[i].minDesde=(leg.duration_in_traffic||leg.duration).text;
      par[i].origenDesde=i===0?'Almacen':par[i-1].nombre;
    }
  });
  var km=(td/1000).toFixed(1),mins=Math.round(tt/60),hrs=Math.floor(mins/60),rem=mins%60;
  document.getElementById('sv-d').textContent=km;document.getElementById('sv-t').textContent=hrs>0?hrs+'h '+rem+'m':mins+'min';
  rutaActiva=true;ui();pines();switchTab('ruta');
  var b=new google.maps.LatLngBounds();b.extend(ALMACEN);par.forEach(function(p){b.extend({lat:p.lat,lng:p.lng});});map.fitBounds(b);
  guardarEnFirebase();toast('Ruta: '+par.length+' paradas, '+km+' km');
}
function pines(){
  if(!map)return;clearRmk();bm.forEach(function(m){m.setMap(null);});
  par.forEach(function(p,i){
    var done=p.entregado;
    var svg='<svg width="38" height="48" viewBox="0 0 38 48" xmlns="http://www.w3.org/2000/svg"><path d="M19 2C12 2 6 8 6 15c0 10 13 31 13 31S32 25 32 15C32 8 26 2 19 2z" fill="'+(done?'#e8f5ef':'#1a6b4a')+'" stroke="'+(done?'#1a6b4a':'#fff')+'" stroke-width="2"/><text x="19" y="18" text-anchor="middle" dominant-baseline="central" font-family="Arial" font-size="12" font-weight="800" fill="'+(done?'#1a6b4a':'#fff')+'">'+(done?'&#10003;':(i+1))+'</text></svg>';
    var m=new google.maps.Marker({position:{lat:p.lat,lng:p.lng},map:map,icon:{url:'data:image/svg+xml;charset=UTF-8,'+encodeURIComponent(svg),scaledSize:new google.maps.Size(38,48),anchor:new google.maps.Point(19,48)},zIndex:1000+i});
    (function(pp,nn){m.addListener('click',function(){iw.setContent('<div style="font-family:Arial;padding:4px"><b>Parada '+nn+'</b><br>'+esc(pp.nombre)+'<br><small>'+pp.id+'</small>'+(pp.entregado?'<br><b style="color:#1a6b4a">Entregado '+pp.horaEntrega+'</b>':'')+'</div>');iw.open(map,m);});})(p,i+1);
    rm.push(m);
  });
}
function clearRmk(){rm.forEach(function(m){m.setMap(null);});rm=[];}
function clearRuta(){rutaActiva=false;if(dr)dr.setDirections({routes:[]});clearRmk();dibujar();}
function limpiar(){par=[];clearRuta();ui();document.getElementById('si').value='';document.getElementById('sr').innerHTML='<div style="padding:14px;text-align:center;color:#7a7870;font-size:13px">Escribe para buscar</div>';document.getElementById('sv-d').textContent='-';document.getElementById('sv-t').textContent='-';dibujar();guardarEnFirebase();toast('Ruta limpiada');}
function compartirWhatsApp(){
  var chofer=document.getElementById('chofer-nombre').value||'Repartidor';
  var hoy=new Date(),dias=['Dom','Lun','Mar','Mie','Jue','Vie','Sab'],meses=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  var fecha=dias[hoy.getDay()]+' '+hoy.getDate()+'-'+meses[hoy.getMonth()]+'-'+hoy.getFullYear();
  var km=document.getElementById('sv-d').textContent,tiempo=document.getElementById('sv-t').textContent;
  var ent=par.filter(function(p){return p.entregado;}).length;
  var nl='\n';
  var msg='*VetReparto*'+nl+'Fecha: '+fecha+nl+'Chofer: *'+chofer+'*'+nl;
  if(km&&km!=='-')msg+='Distancia: '+km+' km / '+tiempo+nl;
  msg+='-------------------'+nl;
  par.forEach(function(p,i){msg+=(p.entregado?'[OK]':'[  ]')+' '+(i+1)+'. '+p.nombre+(p.pedido?' Ped:'+p.pedido:'')+(p.factura?' FAC:'+p.factura:'')+(p.entregado&&p.horaEntrega?' '+p.horaEntrega:'')+nl;});
  msg+='-------------------'+nl+par.length+' paradas | '+ent+' entregados';
  window.open('https://wa.me/?text='+encodeURIComponent(msg),'_blank');
}
function descargarResumen(){
  var chofer=document.getElementById('chofer-nombre').value||'Repartidor';
  var hoy=new Date(),fecha=hoy.getDate()+'/'+(hoy.getMonth()+1)+'/'+hoy.getFullYear();
  var csv='RESUMEN - '+chofer+'\r\nFecha: '+fecha+'\r\n\r\n';
  csv+='"No.","ID SAP","Cliente","Pedido","Factura","Estado","Hora","Desde","Km","Tiempo"\r\n';
  par.forEach(function(p,i){csv+='"'+(i+1)+'","'+p.id+'","'+p.nombre+'","'+(p.pedido||'')+'","'+(p.factura||'')+'","'+(p.entregado?'Entregado':'Pendiente')+'","'+(p.horaEntrega||'')+'","'+(p.origenDesde||'')+'","'+(p.kmDesde||'')+'","'+(p.minDesde||'')+'"\r\n';});
  var blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='ruta_'+chofer.replace(/\s+/g,'_')+'_'+hoy.getDate()+'_'+(hoy.getMonth()+1)+'.csv';a.click();
  toast('Descargado');
}
function switchTab(t){document.querySelectorAll('.tab').forEach(function(x){x.classList.remove('active');});document.querySelectorAll('.tc').forEach(function(x){x.classList.remove('active');});document.getElementById('tab-'+t).classList.add('active');document.getElementById('content-'+t).classList.add('active');}
var showingMap=false;
function toggleMap(){showingMap=!showingMap;var panel=document.getElementById('panel'),btn=document.getElementById('map-toggle-btn');if(showingMap){panel.classList.add('map-view');btn.textContent='Ver paradas';}else{panel.classList.remove('map-view');btn.textContent='Ver mapa';}if(showingMap&&map)setTimeout(function(){google.maps.event.trigger(map,'resize');},350);}
function toast(msg){var t=document.getElementById('toast');t.innerHTML=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2500);}
window.initMap=initMap;
</script>
