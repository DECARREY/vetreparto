<body>
<div id="app">
  <div class="topbar">
    <span style="font-size:16px">&#128062;</span>

    <span style="background:rgba(255,255,255,0.2);padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;margin-left:4px"><span id="total-c">...</span> clientes</span>
  </div>
  <div class="body">
    <div class="panel" id="panel">

        <button class="tab" id="tab-equipo" onclick="switchTab('equipo');cargarEquipo()">Equipo</button>
      </div>
      <div class="tc active" id="content-buscar">
        <div class="sbox"><input type="text" id="si" placeholder="Nombre o ID SAP..." oninput="buscar(this.value)" autocomplete="off"></div>
        <div style="padding:8px 12px;border-bottom:1px solid #e4e2da;flex-shrink:0">
          <button class="libre-toggle" onclick="toggleLibre()">&#x1F4CC; + Parada libre / Cobranza</button>
          <button class="libre-toggle" onclick="togglePaqueteria()" style="background:#e6f1fb;color:#0f4a8a;border-color:#c7d8f0;margin-top:6px">&#x1F4E6; + Envio por paqueteria</button>
        </div>
        <div id="libre-form" style="display:none">
          <div class="libre-box">
            <div style="display:flex;gap:6px;margin-bottom:6px">
              <button id="libre-tab-cliente" onclick="libreSetTab('cliente')" style="flex:1;padding:6px;background:#1a6b4a;color:#fff;border:none;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;font-family:Arial">Cliente registrado</button>

            </div>
            <div id="libre-panel-cliente">
              <input type="text" id="libre-cliente-search" placeholder="Buscar cliente para cobranza..." oninput="libreClienteBuscar(this.value)" autocomplete="off" style="margin-bottom:4px">

              <input type="hidden" id="libre-cliente-id">
              <input type="hidden" id="libre-cliente-lat">
              <input type="hidden" id="libre-cliente-lng">
              <input type="hidden" id="libre-cliente-dir">
            </div>
            <div id="libre-panel-dir" style="display:none">
              <input type="text" id="libre-dir" placeholder="Direccion o lugar..." autocomplete="off">
            </div>
            <input type="text" id="libre-motivo" placeholder="Motivo (ej: Cobranza, Deposito banco...)">
            <button class="libre-btn" onclick="agregarLibre()">Agregar parada</button>
          </div>
        </div>
        <div id="paqueteria-form" style="display:none">
          <div class="libre-box" style="background:#e6f1fb;border-color:#c7d8f0">

              <option value="Paqueteria Inbox">Inbox</option>
              <option value="Paqueteria ODM">ODM</option>
              <option value="Paqueteria Teamex">Teamex</option>
              <option value="otros">Otra paqueteria...</option>
            </select>

            </div>

            <input type="hidden" id="paq-cliente-id">

      </div>
      <div class="tc" id="content-ruta">
        <div class="chofer-box">
          <select id="chofer-select" onchange="cambiarChofer(this.value)">

            <option value="Angel">Angel</option>
            <option value="Arturo">Arturo</option>
            <option value="Silvia">Silvia</option>
            <option value="Mercedes">Mercedes</option>
            <option value="Luis">Luis</option>
            <option value="Marco">Marco</option>
            <option value="Eunice">Eunice</option>
            <option value="otros">Otros...</option>
          </select>
          <input type="text" id="chofer-nombre" placeholder="Escribe tu nombre..." oninput="guardarEnFirebase()" style="display:none;margin-top:6px">
        </div>
        <div class="pfooter">
          <button class="cbtn" id="cb" onclick="calcular()" disabled>Calcular ruta optima</button>
          <button class="recalc-btn" id="recalc-btn" onclick="recalcularDesdeAqui()">Recalcular desde aqui</button>
          <div class="row2">
            <button class="clrbtn" onclick="limpiar()">Limpiar</button>
            <button class="clrbtn wa" onclick="switchTab('resumen');actualizarResumen()">WhatsApp</button>
          </div>
          <div class="rsum" id="rs" style="display:none;margin-top:8px">
            <div class="rstat"><div class="rsval" id="sv-p">0</div><div class="rslbl">Paradas</div></div>
            <div class="rstat"><div class="rsval" id="sv-d">-</div><div class="rslbl">Km</div></div>
            <div class="rstat"><div class="rsval" id="sv-t">-</div><div class="rslbl">Tiempo</div></div>
          </div>
        </div>
        <div class="ph"><span style="font-size:13px;font-weight:700">Paradas del dia</span><span class="pcnt" id="pc">0</span></div>
        <div class="plist" id="pl"><div class="empty"><div style="font-size:28px;opacity:0.4">&#128205;</div><div>Sin paradas</div><div style="font-size:11px">Agrega desde Buscar</div></div></div>
      </div>
      <div class="tc" id="content-resumen">
        <div class="res-btns">
          <button class="dl-btn wa" onclick="compartirWhatsApp()">Compartir WhatsApp</button>
          <button class="dl-btn csv" onclick="descargarResumen()">Descargar CSV</button>
        </div>
        <div class="resumen-body" id="resumen-body"><div style="padding:16px;text-align:center;color:#7a7870;font-size:13px">Agrega paradas para ver el resumen</div></div>
      </div>
      <div class="tc" id="content-equipo" style="flex-direction:column;overflow:hidden">
        <div style="padding:10px 12px;border-bottom:1px solid #e4e2da;flex-shrink:0;display:flex;align-items:center;justify-content:space-between">
          <div style="font-size:13px;font-weight:700">Equipo — Entregas del dia</div>
          <button onclick="cargarEquipo()" style="background:#1a6b4a;color:#fff;border:none;border-radius:6px;padding:5px 10px;font-size:11px;font-weight:700;cursor:pointer;font-family:Arial">Actualizar</button>
        </div>
        <div id="equipo-body" style="flex:1;overflow-y:auto;padding:10px 12px">
          <div style="text-align:center;color:#7a7870;font-size:13px;padding:24px">Cargando...</div>
        </div>
      </div>
    </div>
    <div class="mapwrap">
      <div id="map"></div>
      <div class="loader" id="ld"><div class="spin"></div>Calculando...</div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<button class="map-toggle" id="map-toggle-btn" onclick="toggleMap()">Ver mapa</button>
<script>
var C=[];
var geocoder;

firebase.auth().onAuthStateChanged(function(user){
  if(!user) return;
  // Carga inicial de clientes
  db.ref('clientes').on('value',function(snap){
    var data=snap.val();
    if(data){
      C=Object.values(data);
      C.sort(function(a,b){return (a.nombre||'').localeCompare(b.nombre||'');});
      var el=document.getElementById('total-c');
      if(el)el.textContent=C.length;
      var el2=document.getElementById('total-c2');
      if(el2)el2.textContent=C.length;
      document.getElementById('sr').innerHTML='<div style="padding:14px;text-align:center;color:#7a7870;font-size:13px">Escribe para buscar entre '+C.length+' clientes</div>';
      if(map&&!rutaActiva)dibujar();
    }
  });
});

var ALMACEN={lat:25.681553680100162,lng:-100.32371502760287};
var map,iw,dr,bm=[],rm=[],par=[],rutaActiva=false;

window.addEventListener('load',function(){
  var sel=document.getElementById('chofer-select');
  var inp=document.getElementById('chofer-nombre');
  var nombres=['angel','arturo','silvia','mercedes','luis','marco','eunice'];
  if(nombres.indexOf(CHOFER_ID)>=0){
    var nombre=CHOFER_ID.charAt(0).toUpperCase()+CHOFER_ID.slice(1);
    sel.value=nombre;
    inp.style.display='none';
  } else if(CHOFER_ID){
    sel.value='otros';
    inp.style.display='block';
    inp.value=CHOFER_ID.charAt(0).toUpperCase()+CHOFER_ID.slice(1);
  }
  var hoy=new Date();
  var fechaHoy=hoy.getFullYear()+'-'+(hoy.getMonth()+1).toString().padStart(2,'0')+'-'+hoy.getDate().toString().padStart(2,'0');
  firebase.auth().onAuthStateChanged(function(user){
    if(!user) return;
    db.ref('rutas/'+CHOFER_ID+'/'+fechaHoy).once('value').then(function(s){
      var d=s.val();
      if(d&&d.paradas&&d.paradas.length>0&&par.length===0){
        par=d.paradas;
        var cn=document.getElementById('chofer-nombre');
        var sel2=document.getElementById('chofer-select');
        if(d.choferNombre&&cn){
          cn.value=d.choferNombre;
          var opt=Array.from(sel2.options).find(function(o){return o.value===d.choferNombre;});
          if(opt){sel2.value=d.choferNombre;}
          else{sel2.value='otros';cn.style.display='block';}
        }
        ui();
        toast('Ruta restaurada: '+d.paradas.length+' paradas');
      }
    }).catch(function(e){console.log('No saved route:',e);});
  });
});

function initMap(){
  map=new google.maps.Map(document.getElementById('map'),{center:{lat:25.6866,lng:-100.3161},zoom:11,mapId:'b30c811ecba5c1918f8d39d9',mapTypeControl:false,streetViewControl:false});
  iw=new google.maps.InfoWindow();
  dr=new google.maps.DirectionsRenderer({suppressMarkers:true,polylineOptions:{strokeColor:'#1a6b4a',strokeWeight:5,strokeOpacity:0.8}});
  dr.setMap(map);
  var almEl=document.createElement('div');almEl.style.cssText='width:20px;height:20px;border-radius:50%;background:#1a6b4a;border:2.5px solid #fff;box-sizing:border-box;';new google.maps.marker.AdvancedMarkerElement({position:ALMACEN,map:map,title:'Almacen',content:almEl,zIndex:2000});
  geocoder=new google.maps.Geocoder();
  dibujar();
}

function toggleLibre(){
  var f=document.getElementById('libre-form');
  var fp=document.getElementById('paqueteria-form');
  fp.style.display='none';
  var show=f.style.display==='none';
  f.style.display=show?'block':'none';
  if(show){
    libreSetTab('cliente');
    document.getElementById('libre-cliente-search').value='';
    document.getElementById('libre-cliente-results').style.display='none';
    document.getElementById('libre-cliente-selected').style.display='none';
    document.getElementById('libre-cliente-id').value='';
    document.getElementById('libre-dir').value='';
    document.getElementById('libre-motivo').value='';
  }
}

function libreSetTab(tab){
  var isCliente=tab==='cliente';
  document.getElementById('libre-panel-cliente').style.display=isCliente?'block':'none';
  document.getElementById('libre-panel-dir').style.display=isCliente?'none':'block';
  document.getElementById('libre-tab-cliente').style.background=isCliente?'#1a6b4a':'#e8f5ef';
  document.getElementById('libre-tab-cliente').style.color=isCliente?'#fff':'#1a6b4a';
  document.getElementById('libre-tab-cliente').style.border=isCliente?'none':'1px solid #b2ddc9';
  document.getElementById('libre-tab-dir').style.background=isCliente?'#e8f5ef':'#1a6b4a';
  document.getElementById('libre-tab-dir').style.color=isCliente?'#1a6b4a':'#fff';
  document.getElementById('libre-tab-dir').style.border=isCliente?'1px solid #b2ddc9':'none';
}

function libreClienteBuscar(v){
  var box=document.getElementById('libre-cliente-results');
  if(!v||v.length<2){box.style.display='none';box.innerHTML='';return;}
  var q=v.toLowerCase();
  var r=C.filter(function(c){
    var n=(c.nombre||'').toLowerCase();var f=(c.nombreFiscal||'').toLowerCase();var id=(c.id||'').toLowerCase();
    return n.indexOf(q)>=0||f.indexOf(q)>=0||id.indexOf(q)>=0;
  }).slice(0,10);
  box.innerHTML='';
  if(!r.length){box.innerHTML='<div style="padding:8px;font-size:11px;color:#7a7870">Sin resultados</div>';box.style.display='block';return;}
  r.forEach(function(c){
    var div=document.createElement('div');
    div.style.cssText='padding:7px 10px;border-bottom:1px solid #f0efe9;cursor:pointer;font-size:11px';
    div.innerHTML='<div style="font-weight:600">'+esc(c.nombreFiscal||c.nombre)+'</div><div style="color:#7a7870">'+esc(c.id||'')+'</div>';
    div.onmouseover=function(){this.style.background='#f0faf5';};
    div.onmouseout=function(){this.style.background='';};
    (function(cl){div.onclick=function(){
      document.getElementById('libre-cliente-id').value=cl.id;
      document.getElementById('libre-cliente-lat').value=cl.lat;
      document.getElementById('libre-cliente-lng').value=cl.lng;
      document.getElementById('libre-cliente-dir').value=cl.dir||'';
      document.getElementById('libre-cliente-search').value='';
      document.getElementById('libre-cliente-results').style.display='none';
      var sel=document.getElementById('libre-cliente-selected');
      sel.textContent=(cl.nombreFiscal||cl.nombre)+' ('+cl.id+')';
      sel.style.display='block';
    };})(c);
    box.appendChild(div);
  });
  box.style.display='block';
}

function agregarLibre(){
  var motivo=document.getElementById('libre-motivo').value.trim();
  var clienteId=document.getElementById('libre-cliente-id').value;
  var isCliente=document.getElementById('libre-panel-cliente').style.display!=='none';
  if(isCliente){
    if(!clienteId){toast('Selecciona un cliente');return;}
    var lat=parseFloat(document.getElementById('libre-cliente-lat').value);
    var lng=parseFloat(document.getElementById('libre-cliente-lng').value);
    var dir=document.getElementById('libre-cliente-dir').value;
    var clienteObj=C.find(function(c){return c.id===clienteId;});
    var nombre=motivo||(clienteObj?(clienteObj.nombreFiscal||clienteObj.nombre):clienteId);
    var id='LIBRE_'+Date.now();
    par.push({id:id,nombre:nombre,nombreFiscal:clienteObj?(clienteObj.nombreFiscal||''):'',dir:dir,lat:lat,lng:lng,esLibre:true,motivo:motivo||'Cobranza',clienteRef:clienteId,entregas:[{pedido:'',factura:'',entregado:false,horaEntrega:null}],kmDesde:null,minDesde:null,origenDesde:null});
    ui();if(map)map.panTo({lat:lat,lng:lng});
    document.getElementById('libre-form').style.display='none';
    toast('+ '+nombre);guardarEnFirebase();
  } else {
    var dir2=document.getElementById('libre-dir').value.trim();
    if(!dir2){toast('Escribe una direccion');return;}
    if(!geocoder){toast('Mapa no listo');return;}
    toast('Buscando direccion...');
    geocoder.geocode({address:dir2+', Monterrey, Mexico'},function(results,status){
      if(status==='OK'&&results[0]){
        var loc=results[0].geometry.location;
        var id='LIBRE_'+Date.now();
        par.push({id:id,nombre:motivo||dir2,dir:results[0].formatted_address,lat:loc.lat(),lng:loc.lng(),esLibre:true,motivo:motivo,entregas:[{pedido:'',factura:'',entregado:false,horaEntrega:null}],kmDesde:null,minDesde:null,origenDesde:null});
        ui();if(map)map.panTo({lat:loc.lat(),lng:loc.lng()});
        document.getElementById('libre-dir').value='';document.getElementById('libre-motivo').value='';
        document.getElementById('libre-form').style.display='none';
        toast('+ '+(motivo||dir2));guardarEnFirebase();
      } else {toast('No se encontro la direccion');}
    });
  }
}

function enR(id){return par.some(function(p){return p.id===id;})}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

function dibujar(){
  if(!map)return;
  bm.forEach(function(m){m.map=null;}); bm=[];
  C.forEach(function(c){
    if(enR(c.id))return;
    var dotEl=document.createElement('div');dotEl.style.cssText='width:12px;height:12px;border-radius:50%;background:#1a6b4a;border:1.5px solid #fff;box-sizing:border-box;opacity:0.7;cursor:pointer;';
    var m=new google.maps.marker.AdvancedMarkerElement({position:{lat:c.lat,lng:c.lng},map:map,title:c.nombre,content:dotEl,zIndex:1});
    (function(cl){m.addListener('click',function(){
      iw.setContent('<div style="font-family:Arial;padding:4px;min-width:150px"><div style="font-size:13px;font-weight:700;margin-bottom:2px">'+esc(cl.nombreFiscal||cl.nombre)+'</div>'+(cl.nombreFiscal?'<div style="font-size:11px;color:#555;margin-bottom:2px">'+esc(cl.nombre)+'</div>':'')+'<div style="font-size:11px;color:#777;margin-bottom:8px">'+cl.id+'</div><button id="iwb" style="width:100%;padding:7px;background:#1a6b4a;color:#fff;border:none;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;">+ Agregar</button></div>');
      iw.open(map,m);
      setTimeout(function(){var b=document.getElementById('iwb');if(b&&!enR(cl.id))b.onclick=function(){agregar(cl);iw.close();};},80);
    });})(c);
    bm.push(m);
  });
}

function buscar(v){
  var box=document.getElementById('sr');
  if(!v||v.length<2){box.innerHTML='<div style="padding:14px;text-align:center;color:#7a7870;font-size:13px">Escribe para buscar</div>';return;}
  var q=v.toLowerCase(),r=C.filter(function(c){var n=(c.nombre||'').toLowerCase();var f=(c.nombreFiscal||'').toLowerCase();return n.indexOf(q)>=0||f.indexOf(q)>=0||c.id.toLowerCase().indexOf(q)>=0||(c.dir||'').toLowerCase().indexOf(q)>=0;}).slice(0,40);
  if(!r.length){box.innerHTML='<div style="padding:14px;text-align:center;color:#7a7870;font-size:13px">Sin resultados</div>';return;}
  var h='';
  r.forEach(function(c){var ya=enR(c.id);var fiscal=c.nombreFiscal||c.nombre;h+='<div class="si"><div class="sich">'+esc(fiscal.charAt(0))+'</div><div style="flex:1;min-width:0"><div class="snm">'+esc(fiscal)+'</div><div class="sid2">'+esc(c.nombre)+' &bull; '+c.id+'</div></div><button class="abtn'+(ya?' added':'')+'" data-id="'+c.id+'">'+(ya?'En ruta':'+ Agregar')+'</button></div>';});
  box.innerHTML=h;
  box.querySelectorAll('.abtn:not(.added)').forEach(function(b){b.addEventListener('click',function(e){e.stopPropagation();var c=C.find(function(x){return x.id===b.dataset.id;});if(c)agregar(c);});});
}

function agregar(c){
  if(!c||enR(c.id)){toast('Ya esta en la ruta');return;}
  par.push({id:c.id,nombre:c.nombre,nombreFiscal:c.nombreFiscal||'',dir:c.dir,lat:c.lat,lng:c.lng,esLibre:false,entregas:[{pedido:'',factura:'',entregado:false,horaEntrega:null}],kmDesde:null,minDesde:null,origenDesde:null});
  ui();if(map)map.panTo({lat:c.lat,lng:c.lng});
  toast('+ '+c.nombre);guardarEnFirebase();
  var inp=document.getElementById('si');if(inp.value.length>=2)buscar(inp.value);
}

function quitar(id){par=par.filter(function(p){return p.id!==id;});ui();clearRuta();guardarEnFirebase();}

function setEntregaField(pid,idx,field,val){
  var p=par.find(function(x){return x.id===pid;});
  if(p&&p.entregas&&p.entregas[idx]){p.entregas[idx][field]=val;guardarEnFirebase();}
}

function agregarEntrega(pid){
  var p=par.find(function(x){return x.id===pid;});
  if(p){if(!p.entregas)p.entregas=[];p.entregas.push({pedido:'',factura:'',entregado:false,horaEntrega:null});ui();guardarEnFirebase();}
}

function eliminarEntrega(pid,idx){
  var p=par.find(function(x){return x.id===pid;});
  if(p&&p.entregas&&p.entregas.length>1){p.entregas.splice(idx,1);ui();guardarEnFirebase();}
}

function marcarEntregaItem(pid,idx){
  var p=par.find(function(x){return x.id===pid;});
  if(!p||!p.entregas||p.entregas[idx].entregado)return;
  p.entregas[idx].entregado=true;
  var now=new Date();
  p.entregas[idx].horaEntrega=now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0');
  if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(function(pos){
      p.entregas[idx].gpsLat=pos.coords.latitude;
      p.entregas[idx].gpsLng=pos.coords.longitude;
      p.entregas[idx].gpsAcc=Math.round(pos.coords.accuracy);
      guardarEnFirebase();
    },function(){guardarEnFirebase();},{enableHighAccuracy:true,timeout:5000,maximumAge:0});
  }
  ui();if(rutaActiva)pines();actualizarResumen();guardarEnFirebase();
  var rb=document.getElementById('recalc-btn');if(rb)rb.classList.add('show');
  toast('Entregado a las '+p.entregas[idx].horaEntrega);
}

function marcarNoEntregado(id){
  var sid=id.replace(/[^a-zA-Z0-9]/g,'_');
  var row=document.getElementById('motivo-row-'+sid);
  if(row)row.classList.toggle('show');
}

function confirmarMotivo(id){
  var sid=id.replace(/[^a-zA-Z0-9]/g,'_');
  var sel=document.getElementById('motivo-sel-'+sid);
  var otro=document.getElementById('motivo-otro-'+sid);
  var motivo=sel?sel.value:'';
  if(motivo==='Otro')motivo=otro&&otro.value?otro.value:'Otro';
  if(!motivo){toast('Selecciona un motivo');return;}
  var p=par.find(function(x){return x.id===id;});if(!p)return;
  p.noEntregado=true;p.entregado=false;
  var now=new Date();
  p.horaNoEntrega=now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0');
  p.motivoNoEntrega=motivo;
  ui();if(rutaActiva)pines();actualizarResumen();guardarEnFirebase();
  var rb=document.getElementById('recalc-btn');if(rb)rb.classList.add('show');
  toast('Visita registrada: '+motivo);
}

function recalcularDesdeAqui(){
  if(!map||!navigator.geolocation){toast('GPS no disponible');return;}
  navigator.geolocation.getCurrentPosition(function(pos){
    var origen={lat:pos.coords.latitude,lng:pos.coords.longitude};
    var pendientes=par.filter(function(p){return !p.entregado&&!p.noEntregado;});
    if(!pendientes.length){toast('No hay paradas pendientes');return;}
    document.getElementById('ld').style.display='flex';
    var ds=new google.maps.DirectionsService();
    var req={origin:origen,destination:{lat:ALMACEN.lat,lng:ALMACEN.lng},waypoints:pendientes.map(function(p){return{location:{lat:p.lat,lng:p.lng},stopover:true};}),travelMode:google.maps.TravelMode.DRIVING,optimizeWaypoints:true};
    ds.route(req,function(res,st){
      document.getElementById('ld').style.display='none';
      if(st!=='OK'){toast('Error recalculando: '+st);return;}
      var ord=res.routes[0].waypoint_order;
      var reordenadas=[];ord.forEach(function(i){reordenadas.push(pendientes[i]);});
      var completadas=par.filter(function(p){return p.entregado||p.noEntregado;});
      par=completadas.concat(reordenadas);
      dr.setDirections(res);ui();pines();guardarEnFirebase();
      toast('Ruta recalculada desde tu ubicacion');
    });
  },function(){toast('No se pudo obtener tu ubicacion');});
}

function ui(){
  var n=par.length;
  document.getElementById('rc').textContent=n;document.getElementById('pc').textContent=n;
  document.getElementById('sv-p').textContent=n;document.getElementById('cb').disabled=n<2;
  var pl=document.getElementById('pl');
  if(!n){pl.innerHTML='<div class="empty"><div style="font-size:28px;opacity:0.4">&#128205;</div><div>Sin paradas</div><div style="font-size:11px">Agrega desde Buscar</div></div>';document.getElementById('rs').style.display='none';return;}
  var h='';
  par.forEach(function(p,i){
    var entregas=p.entregas||[{pedido:p.pedido||'',factura:p.factura||'',entregado:p.entregado||false,horaEntrega:p.horaEntrega||null}];
    var todasEntregadas=entregas.every(function(e){return e.entregado;});
    var esLibre=p.esLibre||false;var esPaq=p.esPaqueteria||false;
    h+='<div class="pitem"><div class="pitem-top"><div class="pnum'+(todasEntregadas?' done':esPaq?' libre':esLibre?' libre':'')+'">'+(todasEntregadas?'&#10003;':(i+1))+'</div><div style="flex:1;min-width:0;overflow:hidden"><div class="pnm">'+esc(p.nombreFiscal||p.nombre)+'</div>'+(p.nombreFiscal?'<div style="font-size:10px;color:#7a7870;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(p.nombre)+' &bull; '+p.id+'</div>':'')+'</div>';
    if(!todasEntregadas)h+='<button class="rbtn" data-id="'+p.id+'">&#x2715;</button>';
    h+='</div>';
    if(esLibre&&p.motivo){h+='<div style="font-size:10px;color:#ff8800;margin-bottom:6px;font-weight:600">&#x1F4CC; '+esc(p.motivo)+'</div>';}
    h+='<div class="entregas-list" id="el_'+p.id+'">';
    if(p.esPaqueteria&&p.clienteDestinatario){h+='<div style="font-size:10px;color:#0f4a8a;margin-bottom:5px;font-weight:600">&#x1F4E6; Destinatario: '+esc(p.clienteDestinatario)+'</div>';}
    entregas.forEach(function(e,ei){
      h+='<div class="entrega-item'+(e.entregado?' done':'')+'">';
      h+='<div class="pfields"><div class="pfield"><label>No. Pedido</label><input type="text" placeholder="ej:75069" value="'+esc(e.pedido||'')+'" data-pid="'+p.id+'" data-idx="'+ei+'" data-field="pedido" class="pfin'+(e.pedido?' filled':'')+'"'+(e.entregado?' disabled':'')+' ></div>';
      h+='<div class="pfield"><label>No. Factura</label><input type="text" placeholder="ej:GI1520" value="'+esc(e.factura||'')+'" data-pid="'+p.id+'" data-idx="'+ei+'" data-field="factura" class="pfin'+(e.factura?' filled':'')+'"'+(e.entregado?' disabled':'')+' ></div></div>';
      if(p.esPaqueteria){h+='<div class="pfields"><div class="pfield" style="grid-column:1/-1"><label>No. Guia</label><input type="text" placeholder="ej:1Z999AA10123456784" value="'+esc(e.guia||'')+'" data-pid="'+p.id+'" data-idx="'+ei+'" data-field="guia" class="pfin'+(e.guia?' filled':'')+'"'+(e.entregado?' disabled':'')+' ></div></div>';}
      h+='<div class="entrega-row">';
      if(e.entregado){h+='<button class="ebtn done">&#10003; Entregado</button><span class="hora-entrega">'+e.horaEntrega+'</span>';}
      else if(p.noEntregado){h+='<button class="ebtn noent-done">&#x2716; No entregado</button><span class="hora-noent">'+(p.horaNoEntrega||'')+'</span>';}
      else{h+='<button class="ebtn pending" data-pid="'+p.id+'" data-idx="'+ei+'">Marcar entregado</button><button class="ebtn noent" data-ne-id="'+p.id+'" style="flex:0.8">No entregado</button>';}
      if(entregas.length>1&&!e.entregado&&!p.noEntregado)h+='<button class="del-entrega-btn" data-pid="'+p.id+'" data-idx="'+ei+'">&#x2715;</button>';
      h+='</div>';
      if(!e.entregado&&!p.noEntregado){

function calcular(){
  if(par.length<2||!map)return;
  document.getElementById('ld').style.display='flex';document.getElementById('cb').disabled=true;clearRmk();
  var ds=new google.maps.DirectionsService();
  var req={origin:{lat:ALMACEN.lat,lng:ALMACEN.lng},destination:{lat:ALMACEN.lat,lng:ALMACEN.lng},waypoints:par.map(function(p){return{location:{lat:p.lat,lng:p.lng},stopover:true};}),travelMode:google.maps.TravelMode.DRIVING,optimizeWaypoints:true};
  ds.route(req,function(res,st){
    if(st==='OK'){procesarRuta(res);}
    else if(st==='ZERO_RESULTS'||st==='NOT_FOUND'){
      req.optimizeWaypoints=false;
      ds.route(req,function(r2,s2){
        document.getElementById('ld').style.display='none';document.getElementById('cb').disabled=false;
        if(s2==='OK'){procesarRuta(r2);}
        else{toast('Error al calcular ruta. Verifica las coordenadas de los clientes.');console.error('Directions error:',s2);}
      });
    } else {document.getElementById('ld').style.display='none';document.getElementById('cb').disabled=false;toast('Error ruta: '+st);}
  });
}

function procesarRuta(res){
  document.getElementById('ld').style.display='none';document.getElementById('cb').disabled=false;
  dr.setDirections(res);
  var ord=res.routes[0].waypoint_order,all=par.slice(0),ro=[];
  ord.forEach(function(i){ro.push(all[i]);});
  par=ro;
  var td=0,tt=0;
  res.routes[0].legs.forEach(function(leg,i){
    td+=leg.distance.value;tt+=(leg.duration_in_traffic||leg.duration).value;
    if(i<par.length){par[i].kmDesde=leg.distance.text;par[i].minDesde=(leg.duration_in_traffic||leg.duration).text;par[i].origenDesde=i===0?'Almacen':par[i-1].nombre;}
  });
  var km=(td/1000).toFixed(1),mins=Math.round(tt/60),hrs=Math.floor(mins/60),rem=mins%60;
  document.getElementById('sv-d').textContent=km;document.getElementById('sv-t').textContent=hrs>0?hrs+'h '+rem+'m':mins+'min';
  rutaActiva=true;ui();pines();switchTab('ruta');
  var b=new google.maps.LatLngBounds();b.extend(ALMACEN);par.forEach(function(p){b.extend({lat:p.lat,lng:p.lng});});map.fitBounds(b);
  guardarEnFirebase();toast('Ruta: '+par.length+' paradas, '+km+' km');
}

      paradas.forEach(function(p,i){
        var entregas = p.entregas||[];
        if(!Array.isArray(entregas)) entregas = Object.values(entregas);
        var todasOk = entregas.every(function(e){return e.entregado;});
        var noEnt = p.noEntregado||false;
        var bgColor = todasOk?'#f0faf5':noEnt?'#fff5f5':'#fff';
        var numColor = todasOk?'#1a6b4a':noEnt?'#dc2626':'#7a7870';
        var numBg = todasOk?'#e8f5ef':noEnt?'#fee2e2':'#f0efe9';
        var numTxt = todasOk?'✓':noEnt?'✗':(i+1);
        h += '<div style="padding:7px 10px;border-bottom:1px solid #f0efe9;background:'+bgColor+'">';
        h += '<div style="display:flex;align-items:center;gap:7px">';
        h += '<div style="width:20px;height:20px;border-radius:50%;background:'+numBg+';color:'+numColor+';display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;flex-shrink:0">'+numTxt+'</div>';
        h += '<div style="flex:1;min-width:0"><div style="font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(p.nombreFiscal||p.nombre)+'</div>';
        if(noEnt&&(p.motivoNoEntrega||p.motivo)) h += '<div style="font-size:10px;color:#dc2626">'+esc(p.motivoNoEntrega||p.motivo)+'</div>';
        h += '</div>';
        if(todasOk&&entregas[0]&&entregas[0].horaEntrega) h += '<div style="font-size:10px;color:#1a6b4a;font-weight:700;flex-shrink:0">'+entregas[0].horaEntrega+'</div>';
        h += '</div>';
        // Pedidos y facturas
        var infoExtra = '';
        entregas.forEach(function(e,ei){
          if(e.pedido||e.factura){
            infoExtra += '<div style="font-size:10px;color:#7a7870;margin-top:2px;padding-left:27px">';
            if(entregas.length>1) infoExtra += 'Entrega '+(ei+1)+': ';
            if(e.pedido) infoExtra += 'Ped:'+e.pedido+' ';
            if(e.factura) infoExtra += 'FAC:'+e.factura;
            if(e.entregado&&e.horaEntrega&&entregas.length>1) infoExtra += ' <span style="color:#1a6b4a;font-weight:700">'+e.horaEntrega+'</span>';
            infoExtra += '</div>';
          }
        });
        if(infoExtra) h += infoExtra;
        h += '</div>';
      });
      h += '</div>';
    });
    body.innerHTML = h;
  }).catch(function(e){
    body.innerHTML = '<div style="text-align:center;color:#dc2626;font-size:13px;padding:24px">Error: '+e.message+'</div>';
  });
}
// ── Fin Vista Equipo ──────────────────────────────────────────────────────────

window.initMap=initMap;
</script>
