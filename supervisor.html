<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:Arial,sans-serif;overflow:hidden}
#app{display:flex;flex-direction:column;height:100vh}
.topbar{height:52px;background:#0f4a8a;display:flex;align-items:center;padding:0 16px;gap:12px;color:#fff;flex-shrink:0}
.topbar h1{font-size:15px;font-weight:700;flex:1}
.nav-tabs{display:flex;background:#0d3d73;flex-shrink:0}
.nav-tab{padding:10px 20px;font-size:13px;font-weight:600;cursor:pointer;border-bottom:3px solid transparent;border:none;background:none;font-family:Arial;color:rgba(255,255,255,0.6)}
.nav-tab.active{color:#fff;border-bottom:3px solid #fff}
.body{display:flex;flex:1;min-height:0;position:relative}
.rutas-panel{width:320px;flex-shrink:0;background:#fff;border-right:1px solid #e4e2da;display:flex;flex-direction:column;overflow-y:auto;z-index:10;transition:transform 0.3s ease}
.panel-header{padding:12px 16px;border-bottom:1px solid #e4e2da;background:#f7f6f2;flex-shrink:0}
.panel-title{font-size:14px;font-weight:700}
.panel-sub{font-size:11px;color:#7a7870;margin-top:2px}
.chofer-card{margin:8px;border-radius:10px;border:2px solid #e4e2da;overflow:hidden}
.chofer-header{padding:10px 12px;display:flex;align-items:center;gap:10px;background:#f7f6f2}
.chofer-nombre{font-size:13px;font-weight:700;flex:1}
.chofer-stats{display:flex;gap:10px}
.cstat{text-align:center}
.cstat-val{font-size:16px;font-weight:800}
.cstat-lbl{font-size:9px;color:#7a7870}
.chofer-paradas{max-height:180px;overflow-y:auto}
.parada-row{display:flex;align-items:center;gap:8px;padding:7px 12px;border-top:1px solid #f0efe9;font-size:12px}
.pnum-s{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;flex-shrink:0}
.pnum-s.ok{background:#e8f5ef;color:#1a6b4a}
.pnum-s.pend{background:#f7f6f2;color:#7a7870}
.pnm-s{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.phora{font-size:10px;color:#1a6b4a;font-weight:700}
.empty-c{padding:16px;text-align:center;color:#7a7870;font-size:12px}
.sync-row{display:flex;align-items:center;gap:6px;padding:8px 16px;border-top:1px solid #e4e2da;flex-shrink:0;background:#f7f6f2;font-size:11px;color:#7a7870;margin-top:auto}
.dot{width:7px;height:7px;border-radius:50%;background:#f87171;transition:background 0.5s;flex-shrink:0}
.dot.on{background:#4ade80}
.mapwrap{flex:1;position:relative}
#map{position:absolute;top:0;left:0;right:0;bottom:0}
.legend{position:absolute;bottom:20px;right:20px;background:#fff;border:1px solid #e4e2da;border-radius:8px;padding:10px 14px;font-size:12px;box-shadow:0 2px 8px rgba(0,0,0,0.1);max-height:200px;overflow-y:auto}
.leg-item{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.leg-item:last-child{margin-bottom:0}
.leg-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.clientes-panel{display:flex;flex:1;min-height:0;flex-direction:column}
.cp-toolbar{padding:12px 16px;border-bottom:1px solid #e4e2da;display:flex;align-items:center;gap:10px;flex-shrink:0;background:#f7f6f2}
.cp-toolbar input{flex:1;padding:8px 12px;border:1px solid #e4e2da;border-radius:8px;font-size:13px;outline:none}
.cp-toolbar input:focus{border-color:#0f4a8a}
.btn-add{background:#0f4a8a;color:#fff;border:none;border-radius:8px;padding:8px 16px;font-size:13px;font-weight:700;cursor:pointer;font-family:Arial;white-space:nowrap}
.cp-count{font-size:12px;color:#7a7870;white-space:nowrap}
.cp-list{flex:1;overflow-y:auto;min-height:0}
.cp-item{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid #f0efe9}
.cp-item:hover{background:#f7f6f2}
.cp-letra{width:32px;height:32px;border-radius:50%;background:#e6f1fb;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#0f4a8a;flex-shrink:0}
.cp-info{flex:1;min-width:0}
.cp-nombre{font-size:13px;font-weight:600;color:#1c1c1a}
.cp-id{font-size:11px;color:#7a7870}
.cp-dir{font-size:11px;color:#7a7870;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cp-actions{display:flex;gap:6px;flex-shrink:0}
.btn-edit{background:#f0f4ff;color:#0f4a8a;border:1px solid #c7d8f0;border-radius:6px;padding:4px 10px;font-size:11px;font-weight:600;cursor:pointer;font-family:Arial}
.btn-del{background:#fff0f0;color:#dc2626;border:1px solid #fcc;border-radius:6px;padding:4px 10px;font-size:11px;font-weight:600;cursor:pointer;font-family:Arial}
.cp-empty{padding:40px;text-align:center;color:#7a7870;font-size:13px}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:1000;display:none;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:12px;width:480px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
.modal-header{padding:16px 20px;border-bottom:1px solid #e4e2da;display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:16px;font-weight:700}
.modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:#7a7870;padding:0 4px}
.modal-body{padding:20px}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:12px;font-weight:600;color:#7a7870;margin-bottom:5px}
.form-group input{width:100%;padding:9px 12px;border:1px solid #e4e2da;border-radius:8px;font-size:13px;outline:none;font-family:Arial}
.form-group input:focus{border-color:#0f4a8a}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.form-hint{font-size:11px;color:#7a7870;margin-top:4px}
.form-hint a{color:#0f4a8a}
.modal-footer{padding:14px 20px;border-top:1px solid #e4e2da;display:flex;gap:8px;justify-content:flex-end}
.btn-cancel{background:#f0efe9;color:#7a7870;border:1px solid #e4e2da;border-radius:8px;padding:9px 18px;font-size:13px;font-weight:600;cursor:pointer;font-family:Arial}
.btn-save{background:#0f4a8a;color:#fff;border:none;border-radius:8px;padding:9px 18px;font-size:13px;font-weight:700;cursor:pointer;font-family:Arial}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:#1c1c1a;color:#fff;padding:10px 16px;border-radius:8px;font-size:13px;font-weight:600;z-index:2000;transition:transform 0.3s;pointer-events:none;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}
.tab-content{display:none;flex:1;min-height:0}
.tab-content.active{display:flex}
.map-toggle{display:none;position:fixed;bottom:14px;right:14px;z-index:200;background:#0f4a8a;color:#fff;border:none;border-radius:50px;padding:12px 18px;font-size:12px;font-weight:700;font-family:Arial;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,0.3)}
@media(max-width:768px){
  .rutas-panel{width:100%;position:absolute;top:0;left:0;bottom:0;right:0}
  .rutas-panel.map-view{transform:translateX(-100%)}
  .mapwrap{width:100%}
  .map-toggle{display:block}
  .topbar h1{font-size:12px}
  .topbar button{font-size:10px;padding:4px 8px}
}
</style>

<script>
// Paleta de colores para choferes dinámicos
var PALETA = ['#1a6b4a','#0f4a8a','#9333ea','#ea580c','#0891b2','#be123c','#65a30d','#b45309'];
var datos = {};
var markers = {};
var colores = {};
var map;
var todosClientes = [];
var clientesFiltrados = [];
var showingMap = false;
var paradaTargetChofer = null;
var fechaHoy = '';

// Fecha de hoy
(function(){
  var hoy = new Date();
  fechaHoy = hoy.getFullYear()+'-'+(hoy.getMonth()+1).toString().padStart(2,'0')+'-'+hoy.getDate().toString().padStart(2,'0');
  var dias=['Domingo','Lunes','Martes','Miercoles','Jueves','Viernes','Sabado'];
  var meses=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  document.getElementById('fecha-hoy').textContent=dias[hoy.getDay()]+' '+hoy.getDate()+' de '+meses[hoy.getMonth()]+' '+hoy.getFullYear();
})();

// Conexión
db.ref('.info/connected').on('value', function(snap){
  var ok = snap.val();
  ['sync-dot','sync-dot2'].forEach(function(id){
    var d=document.getElementById(id);
    if(d)d.classList.toggle('on',ok);
  });
  ['sync-label','sync-label2'].forEach(function(id){
    var l=document.getElementById(id);
    if(l)l.textContent=ok?'Conectado - tiempo real':'Sin conexion';
  });
});

// Escuchar TODAS las rutas del día dinámicamente
db.ref('rutas').on('value', function(snap){
  var val = snap.val();
  datos = {};
  if(val){
    Object.keys(val).forEach(function(cid){
      var rutaChofer = val[cid];
      if(!rutaChofer) return;
      if(rutaChofer.paradas){
        // Formato antiguo: datos directamente en rutas/cid
        datos[cid] = rutaChofer;
      } else if(rutaChofer[fechaHoy]){
        // Formato nuevo: datos en rutas/cid/fecha
        datos[cid] = rutaChofer[fechaHoy];
      } else {
        // Buscar la fecha más reciente disponible
        var fechas = Object.keys(rutaChofer).sort().reverse();
        if(fechas.length && rutaChofer[fechas[0]] && rutaChofer[fechas[0]].paradas){
          datos[cid] = rutaChofer[fechas[0]];
        }
      }
    });
  }
  renderChoferes();
  if(map) actualizarMapa();
});

// Clientes
db.ref('clientes').on('value', function(snap){
  var data = snap.val();
  todosClientes = [];
  if(data){
    Object.keys(data).forEach(function(key){
      todosClientes.push(Object.assign({_key:key}, data[key]));
    });
    todosClientes.sort(function(a,b){return a.nombre.localeCompare(b.nombre);});
  }
  document.getElementById('total-clientes').textContent = todosClientes.length;
  filtrarClientes(document.getElementById('cp-search').value);
});

function getColor(cid){
  if(!colores[cid]){
    var idx = Object.keys(colores).length % PALETA.length;
    colores[cid] = PALETA[idx];
  }
  return colores[cid];
}

function renderChoferes(){
  var container = document.getElementById('choferes-container');
  var legend = document.getElementById('legend');
  var choferes = Object.keys(datos).filter(function(cid){
    var d = datos[cid];
    if(!d) return false;
    // Support both array paradas and object paradas (Firebase arrays)
    if(Array.isArray(d.paradas)) return d.paradas.length > 0;
    if(d.paradas && typeof d.paradas === 'object') return Object.keys(d.paradas).length > 0;
    return false;
  });

  if(!choferes.length){
    container.innerHTML = '<div class="empty-c" style="padding:24px">Sin rutas activas hoy</div>';
    legend.innerHTML = '';
    return;
  }

  var html = '';
  var legendHtml = '';

  choferes.forEach(function(cid){
    var d = datos[cid];
    var color = getColor(cid);
    var nombre = (d && d.choferNombre) || cid.charAt(0).toUpperCase()+cid.slice(1);
    // Support Firebase object arrays and JS arrays
    var paradasRaw = (d && d.paradas) || [];
    var paradas = Array.isArray(paradasRaw) ? paradasRaw : Object.values(paradasRaw);
    var ent = paradas.filter(function(p){
      var entregas = p.entregas || [];
      return entregas.length ? entregas.every(function(e){return e.entregado;}) : p.entregado;
    }).length;

    html += '<div class="chofer-card" style="border-color:'+color+'">';
    html += '<div class="chofer-header" style="background:'+color+'22">';
    html += '<div style="width:10px;height:10px;border-radius:50%;background:'+color+';flex-shrink:0"></div>';
    html += '<div class="chofer-nombre">'+esc(nombre)+'</div>';
    html += '<div class="chofer-stats">';
    html += '<div class="cstat"><div class="cstat-val" style="color:'+color+'">'+paradas.length+'</div><div class="cstat-lbl">Paradas</div></div>';
    html += '<div class="cstat"><div class="cstat-val" style="color:'+color+'">'+ent+'</div><div class="cstat-lbl">Entregados</div></div>';
    html += '<div class="cstat"><div class="cstat-val" style="color:'+color+'">'+(d.km||'-')+'</div><div class="cstat-lbl">Km</div></div>';
    html += '</div></div>';
    html += '<div class="chofer-paradas">';
    if(!paradas.length){
      html += '<div class="empty-c">Sin paradas</div>';
    } else {
      paradas.forEach(function(p,i){
        var entregas = p.entregas || [];
        var ok = entregas.length ? entregas.every(function(e){return e.entregado;}) : p.entregado;
        var hora = entregas.length && entregas[entregas.length-1].horaEntrega ? entregas[entregas.length-1].horaEntrega : (p.horaEntrega||'');
        html += '<div class="parada-row">';
        html += '<div class="pnum-s '+(ok?'ok':'pend')+'">'+(ok?'&#10003;':(i+1))+'</div>';
        html += '<div class="pnm-s">'+esc(p.nombre)+'</div>';
        if(hora) html += '<div class="phora">'+hora+'</div>';
        html += '</div>';
      });
    }
    html += '</div>';
    html += '<div style="padding:6px 8px;border-top:1px solid #e4e2da">';
    html += '<button onclick="abrirAgregarParada(\''+cid+'\')" style="width:100%;padding:6px;background:'+color+'22;color:'+color+';border:1px dashed '+color+'88;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;font-family:Arial">+ Agregar parada a '+esc(nombre)+'</button>';
    html += '</div></div>';

    legendHtml += '<div class="leg-item"><div class="leg-dot" style="background:'+color+'"></div><span>'+esc(nombre)+'</span></div>';
  });

  legendHtml += '<div class="leg-item"><div class="leg-dot" style="border:2px solid #ccc;background:#fff"></div><span>Pendiente</span></div>';
  legendHtml += '<div class="leg-item"><div class="leg-dot" style="background:#e8f5ef;border:2px solid #1a6b4a"></div><span>Entregado</span></div>';

  container.innerHTML = html;
  legend.innerHTML = legendHtml;
}

function actualizarMapa(){
  Object.keys(markers).forEach(function(cid){
    markers[cid].forEach(function(m){m.setMap(null);});
    markers[cid] = [];
  });
  Object.keys(datos).forEach(function(cid){
    var d = datos[cid];
    if(!d||!d.paradas)return;
    var color = getColor(cid);
    markers[cid] = markers[cid] || [];
    var paradasArr = Array.isArray(d.paradas) ? d.paradas : Object.values(d.paradas);
    paradasArr.forEach(function(p,i){
      var entregas = p.entregas || [];
      var done = entregas.length ? entregas.every(function(e){return e.entregado;}) : p.entregado;
      var svg='<svg width="34" height="42" viewBox="0 0 34 42" xmlns="http://www.w3.org/2000/svg"><path d="M17 2C10.4 2 5 7.4 5 14c0 9.5 12 26 12 26S29 23.5 29 14C29 7.4 23.6 2 17 2z" fill="'+(done?'#e8f5ef':color)+'" stroke="'+(done?color:'#fff')+'" stroke-width="2"/><text x="17" y="16" text-anchor="middle" dominant-baseline="central" font-family="Arial" font-size="11" font-weight="800" fill="'+(done?color:'#fff')+'">'+(done?'&#10003;':(i+1))+'</text></svg>';
      var m=new google.maps.Marker({position:{lat:p.lat,lng:p.lng},map:map,icon:{url:'data:image/svg+xml;charset=UTF-8,'+encodeURIComponent(svg),scaledSize:new google.maps.Size(34,42),anchor:new google.maps.Point(17,42)},title:(i+1)+'. '+p.nombre,zIndex:done?10:100+i});
      markers[cid].push(m);
    });
  });
}

function initMap(){
  map=new google.maps.Map(document.getElementById('map'),{center:{lat:25.6866,lng:-100.3161},zoom:11,mapTypeControl:false,streetViewControl:false,styles:[{featureType:'poi',elementType:'labels',stylers:[{visibility:'off'}]}]});
  new google.maps.Marker({position:{lat:25.681553680100162,lng:-100.32371502760287},map:map,title:'Almacen',icon:{path:google.maps.SymbolPath.CIRCLE,scale:10,fillColor:'#ff8800',fillOpacity:1,strokeColor:'#fff',strokeWeight:2},zIndex:3000});
  actualizarMapa();
}

// Agregar parada desde supervisor
function abrirAgregarParada(cid){
  paradaTargetChofer = cid;
  var d = datos[cid];
  var nombre = (d&&d.choferNombre)||cid.charAt(0).toUpperCase()+cid.slice(1);
  document.getElementById('modal-parada-title').textContent = 'Agregar parada a '+nombre;
  document.getElementById('mp-search').value = '';
  document.getElementById('mp-results').innerHTML = '<div style="padding:12px;text-align:center;color:#7a7870;font-size:12px">Escribe para buscar</div>';
  document.getElementById('modal-parada').classList.add('open');
  setTimeout(function(){document.getElementById('mp-search').focus();},100);
}

function cerrarAgregarParada(){
  document.getElementById('modal-parada').classList.remove('open');
  paradaTargetChofer = null;
}

function buscarParada(v){
  var box=document.getElementById('mp-results');
  if(!v||v.length<2){box.innerHTML='<div style="padding:12px;text-align:center;color:#7a7870;font-size:12px">Escribe para buscar</div>';return;}
  var q=v.toLowerCase();
  var r=todosClientes.filter(function(c){return c.nombre.toLowerCase().indexOf(q)>=0||c.id.toLowerCase().indexOf(q)>=0||(c.dir||'').toLowerCase().indexOf(q)>=0;}).slice(0,20);
  if(!r.length){box.innerHTML='<div style="padding:12px;text-align:center;color:#7a7870;font-size:12px">Sin resultados</div>';return;}
  var h='';
  r.forEach(function(c){
    h+='<div style="display:flex;align-items:center;gap:10px;padding:10px 12px;border-bottom:1px solid #f0efe9;cursor:pointer;transition:background 0.1s" onmouseover="this.style.background=\'#f7f6f2\'" onmouseout="this.style.background=\'\'" onclick="agregarParadaAChofer(\''+c._key+'\')">';
    h+='<div style="width:28px;height:28px;border-radius:50%;background:#e8f5ef;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#1a6b4a;flex-shrink:0">'+esc(c.nombre.charAt(0))+'</div>';
    h+='<div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:600">'+esc(c.nombre)+'</div><div style="font-size:11px;color:#7a7870">'+c.id+'</div></div>';
    h+='<div style="font-size:11px;color:#1a6b4a;font-weight:700">+ Agregar</div></div>';
  });
  box.innerHTML=h;
}

function agregarParadaAChofer(key){
  if(!paradaTargetChofer)return;
  var c=todosClientes.find(function(x){return x._key===key;});
  if(!c){toast('Cliente no encontrado');return;}
  var cid=paradaTargetChofer;
  var d=datos[cid];
  var paradas=(d&&d.paradas)?d.paradas.slice():[];
  if(paradas.some(function(p){return p.id===c.id;})){
    var nombre=(d&&d.choferNombre)||cid.charAt(0).toUpperCase()+cid.slice(1);
    toast('Ya está en la ruta de '+nombre);return;
  }
  paradas.push({id:c.id,nombre:c.nombre,dir:c.dir||'',lat:c.lat,lng:c.lng,esLibre:false,entregas:[{pedido:'',factura:'',entregado:false,horaEntrega:null}],kmDesde:null,minDesde:null,origenDesde:null});
  var update={paradas:paradas,ultimaActualizacion:Date.now()};
  if(d&&d.choferNombre)update.choferNombre=d.choferNombre;
  if(d&&d.km)update.km=d.km;
  if(d&&d.tiempo)update.tiempo=d.tiempo;
  db.ref('rutas/'+cid+'/'+fechaHoy).set(update).then(function(){
    var nombre=(d&&d.choferNombre)||cid.charAt(0).toUpperCase()+cid.slice(1);
    toast('Parada agregada a '+nombre);
    cerrarAgregarParada();
  }).catch(function(e){toast('Error: '+e.message);});
}

// Clientes CRUD
function filtrarClientes(q){
  var query=(q||'').toLowerCase().trim();
  clientesFiltrados=query?todosClientes.filter(function(c){return c.nombre.toLowerCase().indexOf(query)>=0||c.id.toLowerCase().indexOf(query)>=0||(c.dir||'').toLowerCase().indexOf(query)>=0;}):todosClientes.slice();
  document.getElementById('cp-count').textContent=clientesFiltrados.length+' de '+todosClientes.length;
  renderClientes();
}

function renderClientes(){
  var list=document.getElementById('cp-list');
  if(!clientesFiltrados.length){list.innerHTML='<div class="cp-empty">'+(todosClientes.length?'Sin resultados':'No hay clientes. Agrega el primero.')+'</div>';return;}
  var h='';
  clientesFiltrados.forEach(function(c){
    h+='<div class="cp-item"><div class="cp-letra">'+esc(c.nombre.charAt(0).toUpperCase())+'</div><div class="cp-info"><div class="cp-nombre">'+esc(c.nombre)+'</div><div class="cp-id">'+c.id+'</div><div class="cp-dir">'+esc(c.dir||'Sin direccion')+'</div></div><div class="cp-actions"><button class="btn-edit" onclick="editarCliente(\''+c._key+'\')">Editar</button><button class="btn-del" onclick="eliminarCliente(\''+c._key+'\',\''+esc(c.nombre)+'\')">Eliminar</button></div></div>';
  });
  list.innerHTML=h;
}

function abrirModal(key,cliente){
  document.getElementById('modal-title').textContent=key?'Editar cliente':'Nuevo cliente';
  document.getElementById('edit-key').value=key||'';
  document.getElementById('f-id').value=(cliente&&cliente.id)||'';
  document.getElementById('f-nombre').value=(cliente&&cliente.nombre)||'';
  document.getElementById('f-dir').value=(cliente&&cliente.dir)||'';
  document.getElementById('f-lat').value=(cliente&&cliente.lat)||'';
  document.getElementById('f-lng').value=(cliente&&cliente.lng)||'';
  document.getElementById('f-id').disabled=!!key;
  document.getElementById('modal').classList.add('open');
  setTimeout(function(){document.getElementById('f-id').disabled?document.getElementById('f-nombre').focus():document.getElementById('f-id').focus();},100);
}
function cerrarModal(){document.getElementById('modal').classList.remove('open');}
function editarCliente(key){var c=todosClientes.find(function(x){return x._key===key;});if(c)abrirModal(key,c);}
function guardarCliente(){
  var key=document.getElementById('edit-key').value;
  var id=document.getElementById('f-id').value.trim().toUpperCase();
  var nombre=document.getElementById('f-nombre').value.trim();
  var dir=document.getElementById('f-dir').value.trim();
  var lat=parseFloat(document.getElementById('f-lat').value);
  var lng=parseFloat(document.getElementById('f-lng').value);
  if(!id||!nombre){toast('ID y Nombre son obligatorios');return;}
  if(isNaN(lat)||isNaN(lng)){toast('Coordenadas invalidas');return;}
  if(lng>0)lng=-lng;
  var data={id:id,nombre:nombre,dir:dir,lat:lat,lng:lng};
  if(key){
    db.ref('clientes/'+key).update(data).then(function(){toast('Cliente actualizado');cerrarModal();}).catch(function(e){toast('Error: '+e.message);});
  } else {
    if(todosClientes.find(function(c){return c.id===id;})){toast('Ya existe un cliente con ese ID');return;}
    db.ref('clientes').push(data).then(function(){toast('Cliente agregado');cerrarModal();}).catch(function(e){toast('Error: '+e.message);});
  }
}
function eliminarCliente(key,nombre){
  if(!confirm('Eliminar "'+nombre+'"?\nEsta accion no se puede deshacer.')){return;}
  db.ref('clientes/'+key).remove().then(function(){toast('Cliente eliminado');}).catch(function(e){toast('Error: '+e.message);});
}

function limpiarDia(){
  var choferes=Object.keys(datos);
  if(!choferes.length){toast('No hay rutas activas');return;}
  if(!confirm('Limpiar todas las rutas del dia?\nEsta accion no se puede deshacer.')){return;}
  var promises=choferes.map(function(cid){return db.ref('rutas/'+cid+'/'+fechaHoy).remove();});
  Promise.all(promises).then(function(){
    datos={};colores={};
    renderChoferes();
    if(map)actualizarMapa();
    toast('Dia limpiado');
  }).catch(function(e){toast('Error: '+e.message);});
}

function descargarDia(){
  var hoy=new Date();
  var fecha=hoy.getDate()+'/'+(hoy.getMonth()+1)+'/'+hoy.getFullYear();
  var wb=XLSX.utils.book_new();
  var choferes=Object.keys(datos).filter(function(cid){return datos[cid]&&datos[cid].paradas;});
  if(!choferes.length){toast('Sin datos para descargar');return;}
  choferes.forEach(function(cid){
    var d=datos[cid];
    var nombre=(d&&d.choferNombre)||cid.charAt(0).toUpperCase()+cid.slice(1);
    var paradas=(d&&d.paradas)||[];
    var rows=[];
    rows.push(['RESUMEN DEL DIA - VetReparto']);
    rows.push(['Fecha:',fecha,'Chofer:',nombre]);
    rows.push(['Distancia:',((d&&d.km)||'-')+' km','Tiempo:',(d&&d.tiempo)||'-']);
    rows.push([]);
    rows.push(['No.','ID SAP','Cliente','Tipo','Entrega','Pedido','Factura','Estado','Hora','Desde','Km tramo','Tiempo tramo']);
    paradas.forEach(function(p,i){
      var entregas=p.entregas||[{pedido:p.pedido||'',factura:p.factura||'',entregado:p.entregado||false,horaEntrega:p.horaEntrega||''}];
      entregas.forEach(function(e,ei){
        rows.push([i+1,p.esLibre?'LIBRE':p.id,p.nombre,p.esLibre?'Libre':'Cliente',ei+1,e.pedido||'',e.factura||'',e.entregado?'Entregado':'Pendiente',e.horaEntrega||'',p.origenDesde||'',p.kmDesde||'',p.minDesde||'']);
      });
    });
    var ws=XLSX.utils.aoa_to_sheet(rows);
    ws['!cols']=[{wch:5},{wch:12},{wch:35},{wch:8},{wch:7},{wch:12},{wch:12},{wch:12},{wch:8},{wch:25},{wch:10},{wch:10}];
    XLSX.utils.book_append_sheet(wb,ws,nombre.substring(0,31));
  });
  XLSX.writeFile(wb,'vetreparto_'+hoy.getDate()+'_'+(hoy.getMonth()+1)+'_'+hoy.getFullYear()+'.xlsx');
  toast('Descargado');
}

function showSection(s,e){
  document.querySelectorAll('.tab-content').forEach(function(x){x.classList.remove('active');});
  document.querySelectorAll('.nav-tab').forEach(function(x){x.classList.remove('active');});
  document.getElementById('section-'+s).classList.add('active');
  if(e&&e.target)e.target.classList.add('active');
  var btn=document.getElementById('map-toggle-btn');
  if(btn)btn.style.display=s==='rutas'?'':'none';
  if(s==='rutas'&&map)setTimeout(function(){google.maps.event.trigger(map,'resize');},100);
}

function toggleMap(){
  showingMap=!showingMap;
  var panel=document.getElementById('rutas-panel'),btn=document.getElementById('map-toggle-btn');
  if(showingMap){panel.classList.add('map-view');btn.textContent='Ver paradas';}
  else{panel.classList.remove('map-view');btn.textContent='Ver mapa';}
  if(showingMap&&map)setTimeout(function(){google.maps.event.trigger(map,'resize');},350);
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function toast(msg){var t=document.getElementById('toast');t.innerHTML=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2500);}
function updateClock(){var now=new Date(),h=now.getHours().toString().padStart(2,'0'),m=now.getMinutes().toString().padStart(2,'0');document.getElementById('hora-actual').textContent=h+':'+m;}
updateClock();setInterval(updateClock,30000);
// Nueva ruta
var nrParadas = [];

function abrirNuevaRuta(){
  nrParadas = [];
  document.getElementById('nr-select').value = '';
  document.getElementById('nr-nombre-libre').style.display = 'none';
  document.getElementById('nr-nombre-libre').value = '';
  document.getElementById('nr-search').value = '';
  document.getElementById('nr-results').innerHTML = '';
  document.getElementById('nr-lista').innerHTML = '';
  document.getElementById('nr-lista-label').style.display = 'none';
  document.getElementById('modal-nueva-ruta').classList.add('open');
  setTimeout(function(){document.getElementById('nr-select').focus();},100);
}

function cerrarNuevaRuta(){
  document.getElementById('modal-nueva-ruta').classList.remove('open');
  nrParadas = [];
}

function nr_seleccionar(val){
  var libre = document.getElementById('nr-nombre-libre');
  if(val === 'otros'){
    libre.style.display = 'block';
    libre.focus();
  } else {
    libre.style.display = 'none';
    libre.value = '';
  }
}

function nr_buscar(v){
  var box = document.getElementById('nr-results');
  if(!v||v.length<2){box.innerHTML='';return;}
  var q = v.toLowerCase();
  var r = todosClientes.filter(function(c){
    return c.nombre.toLowerCase().indexOf(q)>=0||c.id.toLowerCase().indexOf(q)>=0||(c.dir||'').toLowerCase().indexOf(q)>=0;
  }).slice(0,20);
  if(!r.length){box.innerHTML='<div style="padding:10px;text-align:center;color:#7a7870;font-size:12px">Sin resultados</div>';return;}
  var h='';
  r.forEach(function(c){
    var yaAgregado = nrParadas.some(function(p){return p.id===c.id;});
    var evts = yaAgregado ? '' : ' onmouseover="this.style.background='#f7f6f2'" onmouseout="this.style.background=''" onclick="nr_agregar(\'' + c._key + '\')"';
    var estilo = yaAgregado ? 'opacity:0.4;' : 'cursor:pointer;';
    h+='<div style="display:flex;align-items:center;gap:10px;padding:9px 12px;border-bottom:1px solid #f0efe9;'+estilo+'"'+evts+'>';
    h+='<div style="width:26px;height:26px;border-radius:50%;background:#e8f5ef;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#1a6b4a;flex-shrink:0">'+esc(c.nombre.charAt(0))+'</div>';
    h+='<div style="flex:1;min-width:0"><div style="font-size:12px;font-weight:600">'+esc(c.nombre)+'</div><div style="font-size:11px;color:#7a7870">'+c.id+'</div></div>';
    if(!yaAgregado) h+='<div style="font-size:11px;color:#1a6b4a;font-weight:700">+ Agregar</div>';
    else h+='<div style="font-size:11px;color:#7a7870">Ya agregado</div>';
    h+='</div>';
  });
  box.innerHTML=h;
}

function nr_agregar(key){
  var c = todosClientes.find(function(x){return x._key===key;});
  if(!c) return;
  if(nrParadas.some(function(p){return p.id===c.id;})){toast('Ya está en la lista');return;}
  nrParadas.push({id:c.id,nombre:c.nombre,dir:c.dir||'',lat:c.lat,lng:c.lng,esLibre:false,entregas:[{pedido:'',factura:'',entregado:false,horaEntrega:null}],kmDesde:null,minDesde:null,origenDesde:null});
  nr_renderLista();
  // Refresh search results
  nr_buscar(document.getElementById('nr-search').value);
  toast('+ '+c.nombre);
}

function nr_quitarParada(idx){
  nrParadas.splice(idx,1);
  nr_renderLista();
  nr_buscar(document.getElementById('nr-search').value);
}

function nr_renderLista(){
  var lista = document.getElementById('nr-lista');
  var label = document.getElementById('nr-lista-label');
  if(!nrParadas.length){lista.innerHTML='';label.style.display='none';return;}
  label.style.display='block';
  var h='';
  nrParadas.forEach(function(p,i){
    h+='<div style="display:flex;align-items:center;gap:8px;padding:6px 8px;background:#f7f6f2;border-radius:6px;margin-bottom:4px">';
    h+='<div style="width:20px;height:20px;border-radius:50%;background:#1a6b4a;color:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;flex-shrink:0">'+(i+1)+'</div>';
    h+='<div style="flex:1;font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(p.nombre)+'</div>';
    h+='<button onclick="nr_quitarParada('+i+')" style="background:none;border:none;color:#ccc;cursor:pointer;font-size:13px;flex-shrink:0">&#x2715;</button>';
    h+='</div>';
  });
  lista.innerHTML=h;
}

function guardarNuevaRuta(){
  var sel = document.getElementById('nr-select').value;
  var libre = document.getElementById('nr-nombre-libre').value.trim();
  if(!sel){toast('Selecciona un vendedor');return;}
  if(sel==='otros'&&!libre){toast('Escribe el nombre del vendedor');return;}
  if(!nrParadas.length){toast('Agrega al menos una parada');return;}

  var choferNombre = sel==='otros' ? libre : sel.charAt(0).toUpperCase()+sel.slice(1);
  var cid = sel==='otros' ? libre.toLowerCase().replace(/\s+/g,'-') : sel;

  var data = {
    choferNombre: choferNombre,
    paradas: nrParadas,
    km: '-',
    tiempo: '-',
    ultimaActualizacion: Date.now()
  };

  db.ref('rutas/'+cid+'/'+fechaHoy).set(data).then(function(){
    toast('Ruta creada para '+choferNombre);
    cerrarNuevaRuta();
  }).catch(function(e){toast('Error: '+e.message);});
}
